<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EV Hub – Universal QR Code</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #39ff14;
      --green-glow: rgba(57, 255, 20, 0.45);
      --bg: #050d1a;
      --card-bg: #0d1a2e;
      --border: rgba(57, 255, 20, 0.25);
      --text: #e2e8f0;
      --subtext: #94a3b8;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* ─── Card Container ─────────────────────────── */
    .container {
      background: var(--card-bg);
      border: 1px solid var(--border);
      box-shadow: 0 0 40px rgba(57, 255, 20, 0.08), inset 0 0 20px rgba(57, 255, 20, 0.03);
      border-radius: 28px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 2rem;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .container:hover {
      box-shadow: 0 0 50px rgba(57, 255, 20, 0.15), inset 0 0 25px rgba(57, 255, 20, 0.05);
      transform: translateY(-2px);
    }

    /* ─── Badge ──────────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(57, 255, 20, 0.08);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.4rem 1.2rem;
      font-size: 0.75rem;
      font-weight: 800;
      color: var(--green);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ─── Header Typography ───────────────────────── */
    .info h1 {
      font-size: 1.75rem;
      font-weight: 900;
      background: linear-gradient(135deg, #ffffff 40%, var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }
    .info p {
      font-size: 0.875rem;
      color: var(--subtext);
      line-height: 1.6;
      max-width: 320px;
      margin: 0 auto;
    }

    /* ─── QR Wrapping ────────────────────────────── */
    .qr-wrap {
      background: #ffffff;
      border-radius: 20px;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: 0 0 0 6px rgba(57, 255, 20, 0.12), 0 20px 40px rgba(0, 0, 0, 0.6);
    }
    .qr-wrap::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 26px;
      border: 2px solid var(--green);
      opacity: 0.3;
      pointer-events: none;
    }
    .qr-wrap canvas {
      display: block;
      border-radius: 8px;
    }

    /* ─── Action Buttons ─────────────────────────── */
    .btn-group {
      display: flex;
      flex-direction: column;
      width: 100%;
      gap: 0.75rem;
    }
    .btn {
      width: 100%;
      padding: 0.875rem;
      font-size: 0.9rem;
      font-weight: 800;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .btn-primary {
      background: linear-gradient(135deg, #39ff14, #05e612);
      border: none;
      color: #050d1a;
      box-shadow: 0 4px 20px var(--green-glow);
    }
    .btn-primary:hover {
      opacity: 0.95;
      transform: translateY(-1px);
      box-shadow: 0 6px 24px var(--green-glow);
    }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text);
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
    }

    /* ─── Print Styles ───────────────────────────── */
    @media print {
      body {
        background: #ffffff;
        color: #000000;
      }
      .container {
        border: none;
        box-shadow: none;
        background: #ffffff;
        transform: none !important;
      }
      .info h1 {
        color: #000000;
        -webkit-text-fill-color: #000000;
      }
      .badge {
        color: #000000;
        border-color: #000000;
        background: #f1f5f9;
      }
      .btn-group {
        display: none;
      }
      .qr-wrap {
        box-shadow: none;
      }
      .qr-wrap::after {
        display: none;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="badge">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
    Universal Key
  </div>

  <div class="info">
    <h1>EV Hub Pass</h1>
    <p>Scan this QR code from your phone's app. It will automatically match and unlock whichever station you have reserved for the current hour.</p>
  </div>

  <div class="qr-wrap">
    <canvas id="qr-canvas"></canvas>
  </div>

  <div class="btn-group">
    <button class="btn btn-primary" onclick="window.print()">
      🖨️ Print Pass
    </button>
    <button class="btn btn-secondary" onclick="window.location.href='/station-qrcodes.html'">
      📋 View Individual Station QRs
    </button>
  </div>
</div>

<script>
  // Encode the universal wildcard key
  QRCode.toCanvas(document.getElementById('qr-canvas'), 'ev-hub-universal', {
    width: 240,
    margin: 1,
    color: {
      dark: '#050d1a',
      light: '#ffffff'
    },
    errorCorrectionLevel: 'H'
  }, function (err) {
    if (err) console.error('Error generating universal QR code:', err);
  });
</script>

</body>
</html>
